<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aman InfraX | Luxury Construction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#0a0a0a;color:#fff}

/* NAVBAR */
nav{
position:fixed;width:100%;display:flex;justify-content:space-between;
padding:20px 60px;background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);z-index:1000;
}
nav img{height:55px}
nav ul{display:flex;gap:30px;list-style:none}
nav ul li{cursor:pointer}
nav ul li:hover{color:#d4af37}

/* HERO VIDEO */
.hero{
height:100vh;position:relative;overflow:hidden;
}
.hero video{
position:absolute;width:100%;height:100%;
object-fit:cover;
}
.overlay{
position:absolute;width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:flex;flex-direction:column;
justify-content:center;align-items:center;
text-align:center;
}
.overlay h1{
font-size:70px;letter-spacing:2px;
}
.overlay p{margin-top:10px}
.btn{
margin-top:20px;padding:12px 40px;
background:#d4af37;border:none;cursor:pointer;
}

/* SECTION */
.section{padding:100px 60px;text-align:center}
.section h2{margin-bottom:40px;font-size:35px}

/* ABOUT */
.about{max-width:800px;margin:auto;opacity:0.85}

/* SERVICES */
.services{
display:flex;gap:20px;flex-wrap:wrap;justify-content:center;
}
.card{
background:rgba(255,255,255,0.05);
padding:25px;width:260px;border-radius:15px;
transition:0.4s;
}
.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px rgba(212,175,55,0.4);
}

/* PROJECTS */
.projects{
display:flex;flex-wrap:wrap;gap:20px;justify-content:center;
}
.project{
width:300px;height:220px;border-radius:10px;overflow:hidden;
}
.project img{width:100%;height:100%;object-fit:cover}
.project:hover{transform:scale(1.05);transition:0.5s}

/* STATS */
.stats{display:flex;justify-content:center;gap:40px
